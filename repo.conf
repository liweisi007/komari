# Central repository defaults used by runtime scripts.
# Fork users who do not rely on GitHub Actions build args can change these once.
KOMARI_PROJECT_OWNER="${KOMARI_PROJECT_OWNER:-jyucoeng}"
KOMARI_PROJECT_NAME="${KOMARI_PROJECT_NAME:-komari}"
KOMARI_SOURCE_BRANCH="${KOMARI_SOURCE_BRANCH:-main}"
KOMARI_SOURCE_REPOSITORY="${KOMARI_SOURCE_REPOSITORY:-${KOMARI_PROJECT_OWNER}/${KOMARI_PROJECT_NAME}}"

# Runtime paths — Docker uses /app, native VPS uses /opt/komari
KOMARI_WORK_DIR="${KOMARI_WORK_DIR:-/opt/komari}"
KOMARI_DATA_DIR="${KOMARI_DATA_DIR:-${KOMARI_WORK_DIR}/data}"
KOMARI_LOG_DIR="${KOMARI_LOG_DIR:-${KOMARI_WORK_DIR}/logs}"
KOMARI_SCRIPT_DIR="${KOMARI_SCRIPT_DIR:-${KOMARI_WORK_DIR}/scripts}"
KOMARI_CONF_DIR="${KOMARI_CONF_DIR:-${KOMARI_WORK_DIR}/conf}"
